name: pixi

# Validate the pixi environment on every push / PR.
# Tests both supported platforms (linux-64 and osx-arm64) using the default
# (CPU-only) environment.

on:
  push:
  pull_request:

jobs:
  pixi-install:
    name: pixi install (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            os: ubuntu-latest
          - platform: osx-arm64
            os: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: 'true'

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          cache: true
          # Only install the default (CPU) environment to keep CI fast.
          environments: default

      - name: Verify PyTorch import
        run: pixi run python -c "import torch; print(f'PyTorch {torch.__version__}')"

      - name: Verify core scientific-stack imports
        run: |
          pixi run python -c "
          import numpy, pandas, scipy, sklearn, PIL, tqdm, wandb, open3d
          import h5py, matplotlib, addict
          import segmentation_models_pytorch as smp
          print('All core imports OK')
          "

      - name: Verify gpmfstream import
        run: pixi run python -c "import gpmfstream; print('gpmfstream OK')"

      - name: Verify project module imports
        run: |
          pixi run python -c "
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path('src').resolve()))
          import sfm, segmentation
          print('Project module imports OK')
          "
