[project]
name = "mee-deepreefmap"
version = "1.1.0"
description = "Scalable 3D Semantic Mapping of Coral Reefs using Deep Learning"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[system-requirements]
cuda = "12"

# ---------------------------------------------------------------------------
# Tasks – mirror the workflows described in README.md
# ---------------------------------------------------------------------------
[tasks]
# Run a 3D reconstruction from a GoPro Hero 10 video.
# Pass extra args, e.g.:
#   pixi run reconstruct --input_video=video.MP4 --timestamp=0-100 --out_dir=out
reconstruct = { cmd = "python reconstruct.py", cwd = "src" }

# Train the SfM (depth-estimation) network on your own data.
# Pass extra args, e.g.:
#   pixi run train-sfm --data <PATH> --checkpoint <CKPT> --name <WANDB_NAME>
train-sfm = { cmd = "python sfm/train_sfm.py", cwd = "src" }

# Train the semantic segmentation network on your own data.
# Pass extra args, e.g.:
#   pixi run train-segmentation --data <PATH> --checkpoint <CKPT> --name <WANDB_NAME>
train-segmentation = { cmd = "python segmentation/train_segmentation_model.py", cwd = "src" }

# ---------------------------------------------------------------------------
# Base (platform-independent) conda dependencies
# ---------------------------------------------------------------------------
[dependencies]
python          = ">=3.10,<3.12"
addict          = "*"
h5py            = "*"
matplotlib      = "*"
numpy           = "*"
open3d          = "*"
pandas          = "*"
pillow          = "*"
pytorch         = "*"
torchvision     = "*"
torchaudio      = "*"
scikit-image    = "*"
scikit-learn    = "*"
scipy           = "*"
tqdm            = "*"
wandb           = "*"
ffmpeg          = "*"          # provides ffmpeg + ffprobe in PATH
pybind11        = "*"          # required to build gpmfstream C extension
setuptools      = "*"
c-compiler      = "*"          # gcc (linux) / clang (mac) for C-extension builds
pip             = "*"
git             = "*"

# ---------------------------------------------------------------------------
# PyPI-only dependencies (no conda-forge package available)
# ---------------------------------------------------------------------------
[pypi-dependencies]
# Encoder/decoder library for semantic segmentation models.
segmentation-models-pytorch = "*"

# GoPro Metadata Format stream parser (C extension; uses git submodules).
# pip / uv will clone the repo and initialise submodules automatically.
gpmfstream = { git = "https://github.com/hovren/gpmfstream.git", rev = "f1a9742" }

# ===========================================================================
# Feature: cuda  – CUDA-enabled PyTorch on Linux (requires an NVIDIA GPU)
# Use:  pixi install --environment cuda
#       pixi run --environment cuda reconstruct ...
# ===========================================================================
[feature.cuda.target.linux-64.dependencies]
pytorch-gpu = "*"

# ===========================================================================
# Environments
# ===========================================================================
[environments]
# Default: CPU on Linux, MPS-capable on macOS Apple Silicon.
default = { solve-group = "default" }
# GPU/CUDA: Linux only. Adds the conda-forge GPU selector package.
cuda    = { features = ["cuda"], solve-group = "cuda" }
